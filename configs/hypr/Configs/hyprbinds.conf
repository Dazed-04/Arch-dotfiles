###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, K, killactive,
bind = $mainMod, E, exec, $fileManager

# Only for dwindle
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, V, exec, "$HOME/.local/bin/myScripts/clipboard/clipboard.sh"
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, T, exec, "$HOME/.local/bin/myScripts/utilities/emoji_launcher.sh"
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, U, exec, "$HOME/.local/bin/myScripts/utilities/utility_menu.sh"
bind = $mainMod SHIFT, F, fullscreen, 0

# For qbit and seanime 
bind = $mainMod, N, exec, ~/.local/bin/myScripts/streaming/toggle-qbit.sh
bind = $mainMod, M, exec, ~/.local/bin/myScripts/streaming/toggle-seanime.sh

# Open wlogout menu
bind = ALT, F4, exec, "$HOME/.local/bin/myScripts/wlogout/wlogout.sh"

# Move focus with mainMod + arrow keys
bind = $mainMod SHIFT, H, movefocus, l
bind = $mainMod SHIFT, L, movefocus, r
bind = $mainMod SHIFT, K, movefocus, u
bind = $mainMod SHIFT, J, movefocus, d
bind = $mainMod, Tab, cyclenext

# Resize windows
binde = $mainMod ALT, K, resizeactive, 0 -15
binde = $mainMod ALT, J, resizeactive, 0 15
binde = $mainMod ALT, H, resizeactive, -15 0
binde = $mainMod ALT, L, resizeactive, 15 0

# Move windows
bind = $mainMod Ctrl, K, movewindow, u
bind = $mainMod Ctrl, J, movewindow, d
bind = $mainMod Ctrl, H, movewindow, l 
bind = $mainMod Ctrl, L, movewindow, r

# Switch focus on windows in Column
bind = $mainMod, period, layoutmsg, move +col 
bind = $mainMod, comma, layoutmsg, move -col

# Swap windows in column
bind = $mainMod SHIFT, period, layoutmsg, swapcol r 
bind = $mainMod SHIFT, comma, layoutmsg, swapcol l

# Center current window 
bind = $mainMod, C, layoutmsg, fit active

# Open Wallpaper selector
bind = $mainMod, W, exec, "$HOME/.local/bin/myScripts/wallpaperRelated/wallpaperSelect.sh"

# Open Theme selector
bind = $mainMod SHIFT, W, exec, kitty --class floating_shell -e "$HOME/.local/bin/myScripts/wallpaperRelated/theme_explorer.sh"

# Take Screenshots using grim + slurp
bind = $mainMod, Y, exec, $HOME/.local/bin/myScripts/screenshots/screenshot.sh --smart # Save without edit 
bind = $mainMod SHIFT, Y, exec, $HOME/.local/bin/myScripts/screenshots/screenshot.sh --smart --edit # Save and edit
bind = $mainMod, PRINT, exec, $HOME/.local/bin/myScripts/screenshots/screenshot.sh --fullscreen

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace for Music
binds {
    workspace_back_and_forth = true
    hide_special_on_workspace_change = true
}

bind = $mainMod SHIFT, M, movetoworkspace, special:music

# Special workspace for scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move between workspaces using keyboard keys
bind = $mainMod SHIFT, right, workspace, e+1
bind = $mainMod SHIFT, left, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
