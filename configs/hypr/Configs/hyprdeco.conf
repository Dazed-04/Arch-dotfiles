general {
  gaps_in = 5
  gaps_out = 10
  border_size = 0
  
  col.active_border = $active_border
  col.inactive_border = $inactive_border

  resize_on_border = false
  allow_tearing = false

  layout = dwindle  
}

decoration {
  rounding = 5
  rounding_power = 10

  active_opacity = 1.0
  inactive_opacity = 0.9
  dim_inactive = true
  dim_strength = 0.2
  border_part_of_window = true 

  shadow {
    enabled = true 
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 4
    passes = 3
    new_optimizations = true
    ignore_opacity = true
    xray = false
    popups = true
    vibrancy = 0.1696
    noise = 0.0117
  }
}

animations {
  enabled = yes
  bezier = default, 0, 0.75, 0.15, 1
  animation = global, 1, 5, default 
}

dwindle {
    pseudotile = false
    preserve_split = true
    force_split = 0
}

master {
  new_status = master
}

scrolling {
  direction = right
  column_width = 0.8
  fullscreen_on_one_column = true
}

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  vfr = true
  vrr = 2
}
