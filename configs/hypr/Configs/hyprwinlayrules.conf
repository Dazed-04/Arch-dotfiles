####################
### WINDOW RULES ###
####################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Windowrule for applications

# File Manager Rules
windowrule {
  name = float-thunar
  match:class = thunar
  float = on
  size = 1000 700
  center = on
  decorate = on
  opacity = 0.7 0.7
}

# Wlctl Window Rule
windowrule {
  name = Float-wlctl
  match:class = ^(wlctl)$
  float = on
  size = 1000 700
  center = on
  decorate = on
}

