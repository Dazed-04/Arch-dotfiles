[general]
framerate = 60
autosens = 1
bars = 0
bar_width = 2
bar_spacing = 1

[input]
method = fifo
source = /tmp/mpd.fifo

[output]
# Required for rmpc to display the visualizer internally
method = raw
raw_target = /dev/stdout
data_format = binary
bit_format = 16bit

[color]
# Using Matugen to create a dynamic gradient
gradient = 1
gradient_count = 8
gradient_color_1 = '{{colors.primary.default.hex}}'
gradient_color_2 = '{{colors.primary_container.default.hex}}'
gradient_color_3 = '{{colors.secondary.default.hex}}'
gradient_color_4 = '{{colors.secondary_container.default.hex}}'
gradient_color_5 = '{{colors.tertiary.default.hex}}'
gradient_color_6 = '{{colors.tertiary_container.default.hex}}'
gradient_color_7 = '{{colors.error.default.hex}}'
gradient_color_8 = '{{colors.outline.default.hex}}'

[smoothing]
noise_reduction = 77
