# Sourced colors
source = ~/.config/hypr/Configs/hyprcolor.conf

# BACKGROUND
background {
    monitor =
    # Matugen will replace this with the actual path to your wallpaper
    path = /home/Dazed/.config/hypr/.current_wallpaper
    blur_passes = 2
    blur_size = 4
    contrast = 1
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# 1. TIME & DATE (Reference Style)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = $subtle_text
    shadow_passes = 1
    shadow_size = 1
    font_size = 25
    font_family = SF Pro Display Bold, JetBrains Mono
    position = 0, 350
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = $subtle_text
    shadow_size = 1
    shadow_passes = 1
    font_size = 120
    font_family = SF Pro Display Bold, JetBrains Mono Extrabold
    position = 0, 250
    halign = center
    valign = center
}

# 2. Profile-Photo
image {
    monitor = 
    path = ~/.config/hypr/image.png
    border_size = 2
    border_color = rgba(255,255,255,0)
    size = 130 
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 40
    halign = center
    valign = center
}

# 3. USER-BOX
shape {
    monitor =
    size = 300, 60
    color = $glass_fill
    rounding = -1
    border_size = 1
    border_color = $glass_border
    rotate = 0
    xray = false
    position = 0, -130
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =     $USER
    color = $subtle_text
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 18
    font_family = SF Pro Display Bold
    position = 0, -130
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $glass_border
    inner_color = $glass_fill
    font_color = $on_primary_container
    fade_on_empty = false
    fail_color = $error 
    fail_text = <i> Incorrect Pass </i><br/><span size='small'>$error</span>
    placeholder_text = 
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}

# 4. SONG DETAILS (Your Features, moved to Bottom)
label {
    monitor =
    text = cmd[update:1000] echo "$($HOME/.config/hypr/scripts/songdetail.sh --title) - $($HOME/.config/hypr/scripts/songdetail.sh --artist)" 
    color = $subtle_text
    shadow_passes = 1
    shadow_size = 1 
    font_size = 14
    font_family = Source Code Pro bold
    position = 0, 50
    halign = center
    valign = bottom
}

# 5. STATUS INFO (Top Right)
label {
    monitor =
    text = cmd[update:5000] echo "$($HOME/.config/hypr/scripts/network.sh) | $($HOME/.config/hypr/scripts/input.sh)"
    color = $lock_text
    font_size = 12
    font_family = Source Code Pro bold
    position = -30, -20
    halign = right
    valign = top
}
