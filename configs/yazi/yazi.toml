##########################
### Yazi Configuration ###
##########################

[mgr]
sort_by = "natural"
sort_sensitive = true
sort_dir_first = true
show_hidden = false
show_symlink = false
linemode_max_width = 400
task_max_concurrent = 4
scrolloff = 5

[preview]
wrap = "yes"

### Plugins ###
[plugin]
prepend_preloaders = [
  { mime = "{audio,video,image}/*", run = "inspector" },
  { mime = "application/subrip", run = "inspector" },
  { mime = "application/postscript", run = "inspector" },
]

prepend_previewers = [
  { mime = "{audio,video,image}/*", run = "inspector" },
  { mime = "application/subrip", run = "inspector" },
  { mime = "application/postscript", run = "inspector" },
  # Archive previewer
  { mime = "application/*zip", run = "ouch" },
  { mime = "application/x-tar", run = "ouch" },
  { mime = "application/x-bzip2", run = "ouch" },
  { mime = "application/x-7z-compressed", run = "ouch" },
  { mime = "application/x-rar", run = "ouch" },
  { mime = "application/vnd.rar", run = "ouch" },
  { mime = "application/x-xz", run = "ouch" },
  { mime = "application/xz", run = "ouch" },
  { mime = "application/x-zstd", run = "ouch" },
  { mime = "application/zstd", run = "ouch" },
  { mime = "application/java-archive", run = "ouch" },
]

# For opening files with application #

[opener]

text_opener = [{ run = 'nvim "$@"', block = true, desc = "Edit in Nvim" }]

# Text opener for nvim
text_opener_float = [
  { run = 'kitty --class yazi-nvim nvim "$@"', orphan = true, desc = "Edit in Nvim-float" },
]

# PDF opener for Zathura
pdf_opener = [{ run = 'zathura "$@"', orphan = true, desc = "View PDF" }]

# PPTX to Temp PDF opener
# pptx_opener = [
#   { run = 'tmp_pdf="/tmp/$(basename "${1%.*}").pdf"; libreoffice --headless --convert-to pdf "$1" --outdir /tmp && zathura "$tmp_pdf"', orphan = true, desc = "View PPTX as PDF" },
# ]

# Uses imv to open image
image_opener = [{ run = 'imv "$@"', orphan = true, desc = "Open in image" }]

# Uses mpv to open video 
video_opener = [
  { run = 'mpv --autofit-larger=70%x70% --force-window=yes "$@"', orphan = true, desc = "Open Video" },
]

# Play using rmpc
music_opener = [{ run = '''
        # 1. Update MPC Queue
        mpc clear; 
        for f in "$@"; do mpc add "${f#$HOME/Music/}"; done; 
        mpc play 1
        
        # 2. Hyprland Workspace Logic
        ~/.config/hypr/scripts/toggleMusic.sh 
    ''', desc = "Play and Switch to Music" }]

[open]
prepend_rules = [
  # 1. Documents
  { name = "*.pptx", use = "pptx_opener" },
  { name = "application/pdf", use = "pdf_opener" },
  { name = "*.pdf", use = "pdf_opener" },

  # 2. Media  
  { name = "*.{mp3,flac,wav,m4a,ogg,opus}", use = "music_opener" },
  { name = "*.gif", use = [
    "video_opener",
    "image_opener",
  ] },
  { mime = "image/*", use = "image_opener" },
  { mime = "video/*", use = "video_opener" },
  { mime = "audio/*", use = "music_opener" },

  # 3. Text and Configs (Fallback)
  { mime = "text/*", use = [
    "text_opener",
    "text_opener_float",
  ] },
  { mime = "application/json", use = [
    "text_opener",
    "text_opener_float",
  ] },
  { name = "*{rc,conf,toml,yaml,yml,json,ini,bak}", use = [
    "text_opener",
    "text_opener_float",
  ] },
]
